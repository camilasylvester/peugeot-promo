<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Promo Mundial</title>
  <style>
    @font-face { font-family:'PeugeotNew'; src:url('fonts/PeugeotNewExtraLight.otf'); font-weight:200; }
    @font-face { font-family:'PeugeotNew'; src:url('fonts/PeugeotNewLight.otf');      font-weight:300; }
    @font-face { font-family:'PeugeotNew'; src:url('fonts/PeugeotNewRegular.otf');    font-weight:400; }
    @font-face { font-family:'PeugeotNew'; src:url('fonts/PeugeotNewBold.otf');       font-weight:700; }
    @font-face { font-family:'PeugeotNew'; src:url('fonts/PeugeotNewBlack.otf');      font-weight:900; }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'PeugeotNew', sans-serif;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #loginScreen {
      position: fixed; inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 32px;
    }

    #loginScreen h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 320px;
    }

    .login-box input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-family: 'PeugeotNew', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-box input:focus { border-color: rgba(255,255,255,0.4); }

    .login-box button {
      background: linear-gradient(160deg, rgba(255,255,255,0.96) 0%, rgba(215,215,215,0.9) 100%);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'PeugeotNew', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-box button:active { opacity: 0.8; }

    .login-error {
      font-size: 12px;
      color: rgba(255,100,100,0.8);
      text-align: center;
      min-height: 16px;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; padding: 40px 24px 60px; max-width: 1100px; margin: 0 auto; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .dash-header h1 {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .dash-header span {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
    }

    /* ── CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 20px 18px;
    }

    .card-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    .card-num {
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }

    .card.total { border-color: rgba(255,255,255,0.18); }
    .card.total .card-num { font-size: 48px; }

    /* ── SECCIÓN ── */
    .seccion {
      margin-bottom: 36px;
    }

    .seccion-titulo {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* ── BARRAS ── */
    .barra-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .barra-label {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      width: 180px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .barra-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .barra-fill {
      height: 100%;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .barra-num {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── TABLA ── */
    .tabla-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead tr {
      background: rgba(255,255,255,0.04);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    td {
      padding: 11px 16px;
      color: rgba(255,255,255,0.7);
      border-top: 1px solid rgba(255,255,255,0.05);
      white-space: nowrap;
    }

    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-gol      { background: rgba(100,220,100,0.15); color: rgba(100,220,100,0.9); }
    .badge-atajada  { background: rgba(255,160,60,0.15);  color: rgba(255,160,60,0.9); }
    .badge-pendiente{ background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }

    /* ── CSV BUTTONS ── */
    .csv-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-csv {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 18px;
      color: rgba(255,255,255,0.7);
      font-family: 'PeugeotNew', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-csv:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
    }

    /* ── FILTRO TABLA ── */
    .filtros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .filtro-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 7px 14px;
      color: rgba(255,255,255,0.45);
      font-family: 'PeugeotNew', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filtro-btn.active, .filtro-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>Promo Mundial — Dashboard</h1>
  <div class="login-box">
    <input type="password" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter') login()"/>
    <button onclick="login()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <h1>Dashboard — Promo Mundial</h1>
    <span id="ultimaActualizacion"></span>
  </div>

  <div id="contenido"><div class="loading">Cargando datos...</div></div>
</div>

<script>
  const SUPABASE_URL = 'https://sjckebychgcclateitqr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TRzNj4K8qyWZEW-sdA0MGg_4M5KqZYB';
  const PASSWORD     = 'promomopar';
  const MARCAS       = ['peugeot', 'citroen', 'jeep', 'ram', 'fiat'];

  let todosLosRegistros = [];
  let filtroActivo = 'todos';

  function login() {
    const val = document.getElementById('passInput').value;
    if (val === PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display   = 'block';
      cargarDatos();
    } else {
      document.getElementById('loginError').textContent = 'Contraseña incorrecta.';
    }
  }

  async function cargarDatos() {
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/registros?select=*&order=created_at.desc&limit=5000`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    todosLosRegistros = await res.json();
    document.getElementById('ultimaActualizacion').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-AR');
    renderDashboard();
  }

  function renderDashboard() {
    const data = todosLosRegistros;
    const total = data.length;

    // Conteo por marca
    const porMarca = {};
    MARCAS.forEach(m => porMarca[m] = 0);
    data.forEach(r => {
      const m = (r.marca || '').toLowerCase();
      if (porMarca[m] !== undefined) porMarca[m]++;
    });

    // Conteo por provincia
    const porProvincia = {};
    data.forEach(r => {
      const p = r.provincia || 'Sin provincia';
      porProvincia[p] = (porProvincia[p] || 0) + 1;
    });
    const topProvincias = Object.entries(porProvincia).sort((a,b) => b[1]-a[1]).slice(0, 10);

    // Conteo por concesionaria
    const porConc = {};
    data.forEach(r => {
      const c = (r.concesionario || 'Sin datos').split(' — ')[0];
      porConc[c] = (porConc[c] || 0) + 1;
    });
    const topConc = Object.entries(porConc).sort((a,b) => b[1]-a[1]).slice(0, 10);

    const maxProv = topProvincias[0]?.[1] || 1;
    const maxConc = topConc[0]?.[1] || 1;

    document.getElementById('contenido').innerHTML = `

      <!-- CARDS -->
      <div class="cards-grid">
        <div class="card total">
          <div class="card-label">Total registrados</div>
          <div class="card-num">${total}</div>
        </div>
        ${MARCAS.map(m => `
        <div class="card">
          <div class="card-label">${m.charAt(0).toUpperCase()+m.slice(1)}</div>
          <div class="card-num">${porMarca[m]}</div>
        </div>`).join('')}
      </div>

      <!-- PROVINCIAS -->
      <div class="seccion">
        <div class="seccion-titulo">Top provincias</div>
        ${topProvincias.map(([prov, n]) => `
          <div class="barra-item">
            <div class="barra-label">${prov}</div>
            <div class="barra-track"><div class="barra-fill" style="width:${Math.round(n/maxProv*100)}%"></div></div>
            <div class="barra-num">${n}</div>
          </div>`).join('')}
      </div>

      <!-- CONCESIONARIAS -->
      <div class="seccion">
        <div class="seccion-titulo">Top concesionarias</div>
        ${topConc.map(([conc, n]) => `
          <div class="barra-item">
            <div class="barra-label">${conc}</div>
            <div class="barra-track"><div class="barra-fill" style="width:${Math.round(n/maxConc*100)}%"></div></div>
            <div class="barra-num">${n}</div>
          </div>`).join('')}
      </div>

      <!-- DESCARGAR CSV -->
      <div class="seccion">
        <div class="seccion-titulo">Descargar CSV</div>
        <div class="csv-grid">
          <button class="btn-csv" onclick="descargarCSV('todos')">⬇ Todos</button>
          ${MARCAS.map(m => `<button class="btn-csv" onclick="descargarCSV('${m}')">⬇ ${m.charAt(0).toUpperCase()+m.slice(1)}</button>`).join('')}
        </div>
      </div>

      <!-- TABLA -->
      <div class="seccion">
        <div class="seccion-titulo">Registros</div>
        <div class="filtros">
          <button class="filtro-btn active" id="filtro-todos" onclick="filtrar('todos')">Todos (${total})</button>
          ${MARCAS.map(m => `<button class="filtro-btn" id="filtro-${m}" onclick="filtrar('${m}')">${m.charAt(0).toUpperCase()+m.slice(1)} (${porMarca[m]})</button>`).join('')}
        </div>
        <div class="tabla-wrap">
          <table>
            <thead><tr>
              <th>Nombre</th>
              <th>Email</th>
              <th>Patente</th>
              <th>Marca</th>
              <th>Provincia</th>
              <th>Concesionaria</th>
              <th>Resultado</th>
              <th>Fecha</th>
            </tr></thead>
            <tbody id="tablaBody"></tbody>
          </table>
        </div>
      </div>
    `;

    renderTabla('todos');
  }

  function filtrar(marca) {
    filtroActivo = marca;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`filtro-${marca}`).classList.add('active');
    renderTabla(marca);
  }

  function renderTabla(marca) {
    const datos = marca === 'todos'
      ? todosLosRegistros
      : todosLosRegistros.filter(r => (r.marca || '').toLowerCase() === marca);

    document.getElementById('tablaBody').innerHTML = datos.map(r => {
      const fecha = r.created_at ? new Date(r.created_at).toLocaleDateString('es-AR') : '—';
      const res   = r.resultado || 'pendiente';
      return `<tr>
        <td>${r.nombre || '—'}</td>
        <td>${r.email || '—'}</td>
        <td>${r.patente || '—'}</td>
        <td>${r.marca || '—'}</td>
        <td>${r.provincia || '—'}</td>
        <td>${(r.concesionario || '—').split(' — ')[0]}</td>
        <td><span class="badge badge-${res}">${res}</span></td>
        <td>${fecha}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="8" style="text-align:center;color:rgba(255,255,255,0.2);padding:30px">Sin registros</td></tr>';
  }

  function descargarCSV(marca) {
    const datos = marca === 'todos'
      ? todosLosRegistros
      : todosLosRegistros.filter(r => (r.marca || '').toLowerCase() === marca);

    const cols = ['nombre','email','patente','marca','provincia','concesionario','resultado','chances','created_at'];
    const header = cols.join(',');
    const rows = datos.map(r =>
      cols.map(c => `"${(r[c] || '').toString().replace(/"/g, '""')}"`).join(',')
    );
    const csv  = [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `registros_${marca}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
