<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peugeot - El Desafío</title>
  <style>
    @font-face { font-family: 'PeugeotNew'; src: url('fonts/PeugeotNewRegular.otf');    font-weight: 400; font-style: normal; }
    @font-face { font-family: 'PeugeotNew'; src: url('fonts/PeugeotNewBold.otf');       font-weight: 700; font-style: normal; }
    @font-face { font-family: 'PeugeotNew'; src: url('fonts/PeugeotNewBlack.otf');      font-weight: 900; font-style: normal; }
    @font-face { font-family: 'PeugeotNew'; src: url('fonts/PeugeotNewLight.otf');      font-weight: 300; font-style: normal; }
    @font-face { font-family: 'PeugeotNew'; src: url('fonts/PeugeotNewExtraLight.otf'); font-weight: 200; font-style: normal; }
  </style>
  <style>
:root {
  --negro: #000000;
  --blanco: #FFFFFF;
  --gris-medio: #888888;
  --glow-color: rgba(255,255,255,0.9);
  --glow-faded: rgba(255,255,255,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--negro);
  color: var(--blanco);
  font-family: 'PeugeotNew', sans-serif;
  height: 100vh;
  overflow: hidden;
}

.cancha {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
}

.cancha-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.18);
  transform-origin: center center;
  filter: none;
}

/* ── FX CINEMÁTICOS ─────────────────────────────── */

/* 1. Blur del crowd — solo la tribuna */
.fx-crowd {
  position: absolute; top: 0; left: 0; right: 0;
  height: 74%;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  pointer-events: none;
  z-index: 2;
}

/* 2. Vignette dramático */
.fx-vignette {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 45%,
      transparent 40%,
      rgba(0,0,0,0.15) 80%,
      rgba(0,0,0,0.4) 100%
    ),
    linear-gradient(to bottom,
      rgba(0,0,0,0.18) 0%,
      transparent 25%,
      transparent 75%,
      rgba(0,0,0,0.08) 100%
    );
  pointer-events: none;
  z-index: 3;
}

/* 3. Rayos de luz desde los reflectores superiores */
.fx-rayos {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 35% 55% at 7% 1%, rgba(180,215,255,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 35% 55% at 93% 1%, rgba(180,215,255,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 20% 40% at 50% 0%, rgba(200,225,255,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 4;
  mix-blend-mode: screen;
}

/* ── ARCO FX ────────────────────────────────────── */

/* Sombra profunda dentro de la red */
.fx-goal-depth {
  position: absolute;
  left: 8%; right: 8%;
  top: 54%; height: 20%;
  pointer-events: none;
  z-index: 7;
  background: radial-gradient(ellipse at 50% 35%,
    transparent 0%,
    rgba(0,0,0,0.25) 55%,
    rgba(0,0,0,0.65) 100%
  );
}

/* Glow blanco sutil — solo gradientes, sin bordes visibles */
.fx-goal-glow {
  position: absolute;
  left: 6%; right: 6%;
  top: 52%; height: 23%;
  pointer-events: none;
  z-index: 8;
  background:
    /* Glow en travesaño — línea de luz horizontal arriba */
    linear-gradient(to bottom,
      rgba(255,255,255,0.07) 0%,
      rgba(255,255,255,0.02) 8%,
      transparent 20%
    ),
    /* Glow en postes — luz lateral izquierda */
    linear-gradient(to right,
      rgba(255,255,255,0.05) 0%,
      transparent 12%
    ),
    /* Glow en postes — luz lateral derecha */
    linear-gradient(to left,
      rgba(255,255,255,0.05) 0%,
      transparent 12%
    ),
    /* Sombra profunda interior de la red */
    radial-gradient(ellipse at 50% 30%,
      transparent 10%,
      rgba(0,0,0,0.35) 70%,
      rgba(0,0,0,0.6) 100%
    );
}

/* Spotlight desde arriba centrando el arco */
.fx-goal-spot {
  position: absolute;
  left: 15%; right: 15%;
  top: 42%; height: 35%;
  pointer-events: none;
  z-index: 6;
  background: radial-gradient(ellipse at 50% 0%,
    rgba(255,255,255,0.06) 0%,
    rgba(255,255,255,0.02) 35%,
    transparent 70%
  );
}

/* 4. Haze / niebla sobre el pasto */
.fx-haze {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 90% 25% at 50% 78%, rgba(255,255,255,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 60% 15% at 50% 100%, rgba(255,255,255,0.04) 0%, transparent 100%);
  pointer-events: none;
  z-index: 5;
}

/* 5. Partículas flotantes */
.fx-particles {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 6;
  overflow: hidden;
}

.fx-particles::before {
  content: '';
  position: absolute;
  width: 1px; height: 1px;
  border-radius: 50%;
  box-shadow:
    12vw 18vh 0 1px rgba(255,255,255,0.35),
    73vw 12vh 0 1px rgba(255,255,255,0.28),
    28vw 42vh 0 1px rgba(255,255,255,0.2),
    81vw 38vh 0 1px rgba(255,255,255,0.22),
    45vw 22vh 0 1px rgba(255,255,255,0.18),
    6vw  55vh 0 1px rgba(255,255,255,0.25),
    58vw 8vh  0 1px rgba(255,255,255,0.3),
    35vw 65vh 0 1px rgba(255,255,255,0.15),
    90vw 28vh 0 1px rgba(255,255,255,0.2),
    20vw 72vh 0 1px rgba(255,255,255,0.12);
  animation: floatA 9s ease-in-out infinite alternate;
}

.fx-particles::after {
  content: '';
  position: absolute;
  width: 1px; height: 1px;
  border-radius: 50%;
  box-shadow:
    55vw 32vh 0 1px rgba(255,255,255,0.22),
    18vw 50vh 0 1px rgba(255,255,255,0.18),
    76vw 60vh 0 1px rgba(255,255,255,0.12),
    40vw 15vh 0 1px rgba(255,255,255,0.28),
    88vw 48vh 0 1px rgba(255,255,255,0.15),
    4vw  30vh 0 1px rgba(255,255,255,0.22),
    62vw 70vh 0 1px rgba(255,255,255,0.1),
    32vw 5vh  0 1px rgba(255,255,255,0.3),
    50vw 80vh 0 1px rgba(255,255,255,0.08),
    15vw 88vh 0 1px rgba(255,255,255,0.1);
  animation: floatB 13s ease-in-out infinite alternate;
}

@keyframes floatA {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(6px, -18px); }
}
@keyframes floatB {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(-8px, -12px); }
}

/* TÍTULO */
.titulo-overlay {
  position: absolute;
  top: 5%;
  width: 100%;
  text-align: center;
  z-index: 20;
}

.titulo-overlay h1 {
  font-size: 34px;
  font-weight: 900;
  font-family: 'PeugeotNew', sans-serif;
  letter-spacing: 1px;
  line-height: 1.25;
  text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

.titulo-overlay span { color: white; }

.titulo-overlay p {
  font-size: 11px;
  font-weight: 300;
  color: rgba(255,255,255,0.55);
  text-shadow: 0 2px 6px rgba(0,0,0,0.8);
  letter-spacing: 0.3px;
  margin-top: 4px;
}

/* PELOTA ESTÁTICA */
.pelota-punto {
  position: absolute;
  left: 50%;
  top: 88%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 50;
  transition: opacity 0.15s;
}

.pelota-punto img {
  width: 54px;
  height: 54px;
  display: block;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
}

/* PELOTA VOLANDO */
.pelota-anim {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  display: none;
  transform: translate(-50%, -50%);
}

.pelota-anim img {
  width: 48px;
  height: 48px;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}

@keyframes spinBall {
  from { transform: rotate(0deg); }
  to   { transform: rotate(600deg); }
}

.pelota-anim.spinning img {
  animation: spinBall 0.6s linear forwards;
}

/* ARQUERO */
.arquero-figura {
  position: absolute;
  left: 50%;
  top: 70%;
  transform: translate(-50%, -100%);
  pointer-events: none;
  z-index: 50;
  transition: left 0.4s cubic-bezier(0.3, 0, 0.1, 1);
  filter:
    drop-shadow(0 8px 24px rgba(0,0,0,0.95))
    drop-shadow(0 2px 6px rgba(0,0,0,0.8));
}

.arquero-figura img {
  height: 155px;
  width: auto;
  display: block;
  transition: opacity 0.08s;
}

/* ── CARTELITO ── */
.cartelito {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.6);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 18px 32px;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
  min-width: 230px;
  max-width: 88vw;
  transition: none;
}

.cartel-icono {
  margin-bottom: 14px;
}

.cartel-icono img {
  width: 90px;
  height: auto;
  filter: drop-shadow(0 0 14px rgba(255,255,255,0.5)) drop-shadow(0 0 30px rgba(255,255,255,0.2));
}

.cartel-texto {
  font-size: 36px;
  font-weight: 900;
  font-family: 'PeugeotNew', sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: white;
  line-height: 1;
}

.cartel-sub {
  margin-top: 10px;
  font-size: 12px;
  font-weight: 300;
  font-family: 'PeugeotNew', sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  line-height: 1.5;
}

/* Badge "2X" que aparece en el cartelito de gol */
.cartel-badge {
  display: inline-block;
  margin-top: 14px;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 6px;
  padding: 6px 18px;
  font-family: 'PeugeotNew', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  box-shadow: 0 0 12px rgba(255,255,255,0.06);
}

.cartel-badge strong {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
}

@keyframes iluminarCartel {
  0%   { opacity: 0;
         transform: translate(-50%, -50%) scale(0.85);
         border-color: rgba(255,255,255,0.2);
         box-shadow: none; }
  40%  { opacity: 1;
         transform: translate(-50%, -50%) scale(1.08);
         border-color: var(--glow-color);
         box-shadow: 0 0 36px var(--glow-color), 0 0 70px var(--glow-faded); }
  70%  { transform: translate(-50%, -50%) scale(1);
         border-color: var(--glow-color); }
  100% { opacity: 1;
         transform: translate(-50%, -50%) scale(1);
         border-color: var(--glow-color);
         box-shadow: 0 0 18px var(--glow-faded); }
}

/* SWIPE HINT */
@keyframes pulseRing {
  0%   { transform: translate(-50%, -50%) scale(0.85); opacity: 0.7; }
  100% { transform: translate(-50%, -50%) scale(2.2);  opacity: 0; }
}

.swipe-hint {
  position: absolute;
  left: 50%;
  top: 88%;
  width: 54px;
  height: 54px;
  border: 2px solid rgba(255,255,255,0.7);
  border-radius: 50%;
  pointer-events: none;
  z-index: 49;
  animation: pulseRing 1.6s ease-out infinite;
}

.swipe-label {
  position: absolute;
  left: 50%;
  top: 93%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 700;
  font-family: 'PeugeotNew', sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
  z-index: 49;
}

/* FLECHA SVG */
.arrow-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 60;
  display: none;
  overflow: visible;
}

@keyframes dashFlow {
  from { stroke-dashoffset: 32; }
  to   { stroke-dashoffset: 0; }
}

#arrowLine {
  stroke: white;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 12 8;
  animation: dashFlow 0.35s linear infinite;
  filter: url(#glow);
}
  </style>
</head>
<body>
<div class="cancha">
  <img src="cancha.png" alt="cancha" class="cancha-img"/>

  <div class="titulo-overlay">
    <h1>Pateá<br/><span>el penal</span></h1>
    <p>Deslizá y definí el partido.</p>
  </div>

  <div class="pelota-punto" id="pelotaPunto">
    <img src="pelota.png" alt="pelota"/>
  </div>

  <div class="swipe-hint"  id="swipeHint"></div>
  <div class="swipe-label" id="swipeLabel">↑ deslizá</div>

  <svg class="arrow-svg" id="arrowSvg">
    <defs>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arrowHead" markerWidth="10" markerHeight="8"
              refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M0,0 L10,4 L0,8 Z" fill="white" opacity="0.95"/>
      </marker>
    </defs>
    <line id="arrowLine" marker-end="url(#arrowHead)"/>
  </svg>

  <div class="arquero-figura" id="arquero">
    <img id="arqueroImg" src="arquerop.png" alt="arquero"/>
  </div>

  <div class="pelota-anim" id="pelotaAnim">
    <img src="pelota.png" alt="pelota"/>
  </div>

  <div class="cartelito" id="cartelito">
    <div class="cartel-icono" id="cartelIcono"></div>
    <div class="cartel-texto" id="cartelTexto"></div>
    <div class="cartel-sub"   id="cartelSub"></div>
    <div id="cartelBadge"></div>
  </div>
</div>

<script>
  // ── SUPABASE ──────────────────────────────────────
  const SUPABASE_URL = 'https://zjmdylynjdlnpbfqygpy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HloZx_VIrCCPAlnoKgVYUA_Ru2lUpbi';

  // Guarda el resultado en Supabase.
  // resultado: 'gol' o 'atajada'
  // chances:   2 (gol) o 1 (atajada)
  async function actualizarResultado(resultado) {
    const registroId = sessionStorage.getItem('registroId');
    if (!registroId) return;
    await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${registroId}`, {
      method: 'PATCH',
      headers: {
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type':  'application/json',
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify({
        resultado,
        chances: resultado === 'gol' ? 2 : 1
      })
    });
  }

  // ── JUEGO ─────────────────────────────────────────
  const destinos = {
    'izq-alto': { top: '40%', left: '15%' },
    'der-alto': { top: '40%', left: '85%' },
    'izq-bajo': { top: '54%', left: '15%' },
    'der-bajo': { top: '54%', left: '85%' },
  };

  let juegoJugado = false;
  let dragStartX = null, dragStartY = null, dragActivo = false;

  function getCoordenadas(e) {
    if (e.touches && e.touches.length)              return { x: e.touches[0].clientX,        y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDragStart(e) {
    if (juegoJugado) return;
    const { x, y } = getCoordenadas(e);
    dragStartX = x; dragStartY = y; dragActivo = true;
  }

  function onDragMove(e) {
    if (!dragActivo || juegoJugado) return;
    const { x, y } = getCoordenadas(e);
    if (y - dragStartY >= -10) { ocultarFlecha(); return; }
    mostrarFlecha(dragStartX, dragStartY, x, y);
  }

  function onDragEnd(e) {
    if (!dragActivo || juegoJugado) return;
    dragActivo = false;
    ocultarFlecha();

    const { x, y } = getCoordenadas(e);
    const dx = x - dragStartX;
    const dy = y - dragStartY;

    if (dy > -40) return;

    const lado   = dx <= 0 ? 'izq' : 'der';
    const altura = Math.abs(dy) > Math.abs(dx) * 1.1 ? 'alto' : 'bajo';

    juegoJugado = true;
    ocultarHint();
    dispararPelota(`${lado}-${altura}`);
  }

  function mostrarFlecha(x1, y1, x2, y2) {
    const svg  = document.getElementById('arrowSvg');
    const line = document.getElementById('arrowLine');
    const dx = x2 - x1, dy = y2 - y1;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const factor = dist > 200 ? 200 / dist : 1;
    svg.style.display = 'block';
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x1 + dx * factor);
    line.setAttribute('y2', y1 + dy * factor);
  }

  function ocultarFlecha() { document.getElementById('arrowSvg').style.display = 'none'; }

  function ocultarHint() {
    document.getElementById('swipeHint').style.display  = 'none';
    document.getElementById('swipeLabel').style.display = 'none';
  }

  const cancha = document.querySelector('.cancha');
  cancha.addEventListener('touchstart', onDragStart, { passive: true });
  cancha.addEventListener('touchmove',  onDragMove,  { passive: true });
  cancha.addEventListener('touchend',   onDragEnd);
  cancha.addEventListener('mousedown',  onDragStart);
  cancha.addEventListener('mousemove',  onDragMove);
  cancha.addEventListener('mouseup',    onDragEnd);

  async function dispararPelota(sector) {
    const esGol = Math.random() < 0.6;

    // Mover arquero
    const ladoPelota  = sector.startsWith('izq') ? 'izq' : 'der';
    const ladoArquero = esGol ? (ladoPelota === 'izq' ? 'der' : 'izq') : ladoPelota;
    moverArquero(ladoArquero);

    // Guardar resultado (fire & forget)
    actualizarResultado(esGol ? 'gol' : 'atajada');

    // Ocultar pelota estática
    document.getElementById('pelotaPunto').style.opacity = '0';

    // Animar pelota
    const pelota  = document.getElementById('pelotaAnim');
    const destino = destinos[sector];
    pelota.style.left    = '50%';
    pelota.style.top     = '76%';
    pelota.style.display = 'block';
    pelota.style.opacity = '1';
    pelota.classList.remove('spinning');
    pelota.offsetHeight;

    const duracion = 600;
    pelota.classList.add('spinning');
    pelota.style.transition = `left ${duracion}ms ease-in, top ${duracion}ms ease-in`;
    pelota.style.left = destino.left;
    pelota.style.top  = destino.top;

    setTimeout(() => {
      pelota.style.transition = 'opacity 200ms';
      pelota.style.opacity = '0';
      mostrarCartelito(esGol);
    }, duracion);

    setTimeout(() => { pelota.style.display = 'none'; }, duracion + 250);
  }

  function moverArquero(lado) {
    const arquero = document.getElementById('arquero');
    const img     = document.getElementById('arqueroImg');
    // Primero cambia la imagen sin mover
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = lado === 'izq' ? 'arqueroi.png' : 'arquerod.png';
      img.style.opacity = '1';
      // Recién después mueve el contenedor
      arquero.style.left = lado === 'izq' ? '27%' : '73%';
    }, 80);
  }

  function mostrarCartelito(esGol) {
    const cartelito = document.getElementById('cartelito');
    const iconoEl   = document.getElementById('cartelIcono');
    const textoEl   = document.getElementById('cartelTexto');
    const subEl     = document.getElementById('cartelSub');
    const badgeEl   = document.getElementById('cartelBadge');

    // Ocultar título al mostrar resultado
    document.querySelector('.titulo-overlay').style.opacity = '0';
    document.querySelector('.titulo-overlay').style.transition = 'opacity 0.3s';

    const logoHTML = '<img src="Peugeot-Blason-Flat-RVB-WBG.png" alt="Peugeot"/>';

    if (esGol) {
      iconoEl.innerHTML   = logoHTML;
      textoEl.textContent = '¡GOL!';
      subEl.innerHTML     = 'Ganaste doble chance<br/>al premio final';
      badgeEl.innerHTML   = '';
      cartelito.style.setProperty('--glow-color', 'rgba(255,255,255,0.95)');
      cartelito.style.setProperty('--glow-faded', 'rgba(255,255,255,0.35)');
    } else {
      iconoEl.innerHTML   = logoHTML;
      textoEl.textContent = '¡ATAJADA!';
      subEl.textContent   = 'Participás igual del sorteo final.';
      badgeEl.innerHTML   = '';
      cartelito.style.setProperty('--glow-color', 'rgba(255,255,255,0.6)');
      cartelito.style.setProperty('--glow-faded', 'rgba(255,255,255,0.2)');
    }

    cartelito.style.animation = 'none';
    cartelito.style.opacity   = '0';
    cartelito.offsetHeight;
    cartelito.style.animation = 'iluminarCartel 0.6s ease-out forwards';
  }
</script>
</body>
</html>
